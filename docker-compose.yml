# ──────────────────────────────────────────────────
# STRATO v21 — Docker Compose (Local Development)
# Run STRATO locally with Docker and persistent data
# ──────────────────────────────────────────────────

services:
  strato:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: strato
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - strato-data:/app/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=8080
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r => { process.exit(r.ok ? 0 : 1); }).catch(() => process.exit(1));"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  strato-data:
    driver: local
