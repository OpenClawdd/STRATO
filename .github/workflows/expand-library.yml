name: Expand Game Library

on:
  schedule:
    - cron: '0 3 * * 0' # 3am UTC every Sunday
  workflow_dispatch: # Manual run button

jobs:
  expand:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm ci

      - name: Run expand script
        run: npm run expand

      - name: Commit and push changes
        run: |
          git config user.email "strato-bot@github.com"
          git config user.name "STRATO Bot"
          git add public/assets/games.json
          git diff --staged --quiet || git commit -m "chore: auto-expand game library [skip ci]"
          git push
