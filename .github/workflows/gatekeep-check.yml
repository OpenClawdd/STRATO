name: Gatekeep Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-community-urls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for community URLs in source
        run: |
          found=0
          # Scan all JS, JSON, and HTML files for known community URLs
          while IFS= read -r file; do
            if rg -n 'https?://(school\.|fmhy\.|blahblah\.)' "$file" 2>/dev/null; then
              found=1
            fi
          done < <(git diff --name-only --diff-filter=ACM origin/main...HEAD -- '*.js' '*.json' '*.html' '*.css' '*.yml')

          if [ "$found" -eq 1 ]; then
            echo "::error::Community URLs detected in PR — replace with \${ENV_VAR} placeholders"
            exit 1
          fi

          echo "No community URLs found — gatekeep passed"
