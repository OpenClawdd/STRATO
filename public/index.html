<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strato Omni-Ingester</title>
  <link rel="stylesheet" href="omni.css">
</head>
<body>

<!-- Master App Wrap -->
<div id="app">

  <!-- 1. Master Collapsible Sidebar -->
  <aside id="master-sidebar">
    <div class="sidebar-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
      </svg>
      <span class="sidebar-text">STRATO</span>
    </div>

    <!-- Navigation Tabs -->
    <nav class="sidebar-tabs">
      <button class="tab-btn active" data-target="tab-home">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        <span class="sidebar-text">Home</span>
      </button>

      <button class="tab-btn" data-target="tab-games">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="6" width="20" height="12" rx="2" ry="2"></rect>
          <path d="M6 12h4m-2-2v4m8-2h.01M16 10h.01"></path>
        </svg>
        <span class="sidebar-text">Games</span>
      </button>

      <button class="tab-btn" data-target="tab-browser">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="2" y1="12" x2="22" y2="12"></line>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
        </svg>
        <span class="sidebar-text">Browser</span>
      </button>

      <button class="tab-btn" data-target="tab-streaming">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect>
          <polyline points="17 2 12 7 7 2"></polyline>
        </svg>
        <span class="sidebar-text">Streaming</span>
      </button>

      <button class="tab-btn" data-target="tab-listening">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 18v-6a9 9 0 0 1 18 0v6"></path>
          <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path>
        </svg>
        <span class="sidebar-text">Listening</span>
      </button>

      <button class="tab-btn" data-target="tab-ai">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
          <circle cx="12" cy="12" r="4"></circle>
        </svg>
        <span class="sidebar-text">AI</span>
      </button>

      <button class="tab-btn" data-target="tab-chatroom">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
        <span class="sidebar-text">Chatroom</span>
      </button>

      <button class="tab-btn" data-target="tab-settings">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
        <span class="sidebar-text">Settings</span>
      </button>
    </nav>

    <!-- Sidebar Footer Toggle -->
    <div class="sidebar-footer">
      <button class="tab-btn" id="sidebar-toggle" title="Toggle Sidebar">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        <span class="sidebar-text">Collapse Sidebar</span>
      </button>
    </div>
  </aside>

  <!-- 2. Main Content Area -->
  <main id="main-content">

    <!-- HOME TAB -->
    <div class="tab-panel active" id="tab-home">
      <div class="glass-container">
        <div style="text-align: center; color: rgba(255,255,255,0.4);">
          <h1 style="font-size: 2rem; margin-bottom: 10px; color: #fff;">Welcome to Stratosphere</h1>
          <p>The sky is the limit.</p>
        </div>
      </div>
    </div>

    <!-- GAMES TAB (Arsenal Integration) -->
    <div class="tab-panel" id="tab-games">
      <div class="games-layout">
        <!-- Arsenal Sources Sidebar -->
        <div class="games-sidebar">
          <div class="games-sidebar-header">
            <h2>Arsenal</h2>
          </div>
          <div id="source-list">
            <!-- Sources injected via omni.js -->
          </div>
        </div>

        <!-- Arsenal Main Grid -->
        <div class="games-main">
          <div class="grid-header">
            <h1>STRATO GAMES</h1>
            <div class="tagline">Filter can't reach up here.</div>
            <div class="stats" id="game-counter">0 Games Loaded</div>
          </div>
          <div class="game-grid" id="game-grid">
            <!-- Game cards injected via omni.js -->
          </div>
        </div>
      </div>
    </div>

    <!-- BROWSER TAB -->
    <div class="tab-panel" id="tab-browser">
      <div class="glass-container">
        <iframe class="glass-iframe" src="about:blank" title="Browser Placeholder"></iframe>
      </div>
    </div>

    <!-- STREAMING TAB -->
    <div class="tab-panel iframe-panel" id="tab-streaming">
      <iframe class="full-iframe" id="streaming-iframe" src="about:blank" title="Streaming Tab"></iframe>
    </div>

    <!-- LISTENING TAB -->
    <div class="tab-panel iframe-panel" id="tab-listening">
      <iframe class="full-iframe" id="listening-iframe" src="about:blank" title="Listening Tab"></iframe>
    </div>

    <!-- AI TAB -->
    <div class="tab-panel" id="tab-ai">
      <div class="glass-container">
        <iframe class="glass-iframe" src="about:blank" title="AI Placeholder"></iframe>
      </div>
    </div>

    <!-- CHATROOM TAB -->
    <div class="tab-panel" id="tab-chatroom">
      <div class="glass-container">
        <iframe class="glass-iframe" src="about:blank" title="Chatroom Placeholder"></iframe>
      </div>
    </div>

    <!-- SETTINGS TAB -->
    <div class="tab-panel" id="tab-settings">
      <div class="glass-container">
        <div style="color: rgba(255,255,255,0.4);">System Configuration Panel</div>
      </div>
    </div>

  </main>
</div>

<!-- Fullscreen Play Overlay -->
<div id="overlay">
  <button id="close-overlay">&times;</button>
  <iframe id="game-iframe" sandbox="allow-scripts allow-same-origin allow-popups"></iframe>
</div>

<!-- Logic Engine -->
<script src="omni.js"></script>
</body>
</html>
