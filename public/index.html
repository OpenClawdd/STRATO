<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STRATO | Dashboard</title>
    <link id="favicon" rel="icon" href="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="/surf/baremux/index.js"></script>
    <script src="/surf/scram/scramjet.bundle.js"></script>
    <style>
        :root {
            --bg: #000000;
            --bg-2: #0a0a0a;
            --bg-3: #121212;
            --bg-4: #1a1a1a;
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --text: #e0e0e0;
            --text-muted: #888;
            --text-bright: #fff;
            --accent: #ff4da6;
            --accent-dark: #e6398d;
            --accent-glow: rgba(255, 77, 166, 0.15);
            --spring: cubic-bezier(0.34, 1.56, 0.84, 1);
            --smooth: cubic-bezier(0.2, 0.8, 0.2, 1);
            --radius: 20px;
            --radius-sm: 14px;
            --radius-lg: 28px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #splash {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s var(--smooth), transform 0.8s var(--smooth);
        }

        .splash-bg {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }

        .splash-bg .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
        }

        .splash-bg .orb:nth-child(1) {
            width: 500px;
            height: 500px;
            background: var(--accent);
            top: -150px;
            left: -150px;
            animation: orbFloat 16s ease-in-out infinite alternate;
        }

        .splash-bg .orb:nth-child(2) {
            width: 400px;
            height: 400px;
            background: #4da6ff;
            bottom: -120px;
            right: -120px;
            animation: orbFloat 20s ease-in-out infinite alternate-reverse;
        }

        .splash-bg .orb:nth-child(3) {
            width: 300px;
            height: 300px;
            background: #a64dff;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: orbFloat 14s ease-in-out infinite alternate;
        }

        @keyframes orbFloat {
            0% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(40px, -40px) scale(1.1);
            }

            100% {
                transform: translate(-20px, 20px) scale(0.95);
            }
        }

        .splash-content {
            position: relative;
            z-index: 1;
            text-align: center;
            user-select: none;
        }

        .splash-logo {
            font-size: 72px;
            font-weight: 800;
            letter-spacing: -2px;
            color: var(--text-bright);
            background: linear-gradient(135deg, #fff 0%, var(--accent) 50%, #4da6ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: logoPulse 4s ease-in-out infinite;
        }

        @keyframes logoPulse {

            0%,
            100% {
                filter: brightness(1);
            }

            50% {
                filter: brightness(1.2);
            }
        }

        .splash-tagline {
            font-size: 16px;
            font-weight: 400;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 12px;
        }

        .splash-enter {
            margin-top: 48px;
            padding: 14px 40px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border-hover);
            border-radius: 50px;
            color: var(--text-bright);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s var(--spring);
            backdrop-filter: blur(10px);
        }

        .splash-enter:hover {
            background: var(--accent-glow);
            border-color: var(--accent);
            color: var(--accent);
            transform: scale(1.05);
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            opacity: 0;
            transform: scale(0.96);
            filter: blur(8px);
            transition: opacity 0.8s var(--smooth), transform 0.8s var(--smooth), filter 0.8s var(--smooth);
            pointer-events: none;
        }

        #app.visible {
            opacity: 1;
            transform: scale(1);
            filter: blur(0);
            pointer-events: auto;
        }

        #topbar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 24px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            z-index: 50;
            flex-shrink: 0;
        }

        .topbar-brand {
            font-size: 16px;
            font-weight: 800;
            color: var(--accent);
            white-space: nowrap;
            margin-right: 8px;
        }

        .topbar-brand span {
            color: var(--text-muted);
            font-weight: 400;
        }

        .search-wrap {
            flex: 1;
            max-width: 520px;
            position: relative;
        }

        .search-wrap input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: 50px;
            color: var(--text);
            font-size: 13px;
            outline: none;
            transition: 0.2s;
            font-family: inherit;
        }

        .search-wrap input:focus {
            border-color: var(--accent);
        }

        .search-wrap svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #555;
            pointer-events: none;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }

        .tb-btn {
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-2);
            color: var(--text);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
            font-family: inherit;
        }

        .tb-btn:hover {
            border-color: var(--border-hover);
            color: var(--text-bright);
        }

        .tb-btn.danger {
            background: rgba(255, 51, 51, 0.1);
            border-color: rgba(255, 51, 51, 0.3);
            color: #ff4444;
        }

        .tb-select {
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-2);
            color: var(--text);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            outline: none;
        }

        #content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 24px 24px 100px 24px;
            scroll-behavior: smooth;
        }

        .view {
            display: none;
            flex-direction: column;
            min-height: 100%;
        }

        .view.active {
            display: flex;
        }

        .view-header {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-bright);
            margin-bottom: 20px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 16px;
        }

        .game-card {
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.25s var(--spring), border-color 0.2s, box-shadow 0.2s;
        }

        .game-card:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: var(--accent);
        }

        .game-card-img {
            width: 100%;
            aspect-ratio: 16/10;
            background: var(--bg-3);
            overflow: hidden;
            position: relative;
        }

        .game-card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .game-card-body {
            padding: 12px 14px;
        }

        .game-card-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-bright);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .game-card-tag {
            font-size: 10px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        #dock {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .dock-item {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-muted);
            transition: 0.25s;
            position: relative;
        }

        .dock-item:hover {
            color: var(--text-bright);
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-4px);
        }

        .dock-item.active {
            color: var(--accent);
            background: var(--accent-glow);
        }

        .watch-launcher,
        .listen-launcher,
        .browse-center {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
        }

        .watch-card,
        .listen-choice-card {
            width: 100%;
            max-width: 400px;
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 40px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            transition: 0.3s;
        }

        .watch-card:hover,
        .listen-choice-card:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: var(--accent);
        }

        .watch-icon,
        .listen-choice-icon {
            width: 72px;
            height: 72px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .watch-label,
        .listen-choice-label {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-bright);
        }

        .watch-desc,
        .listen-choice-desc {
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
        }

        .watch-player-wrap,
        .listen-player-wrap {
            flex: 1;
            display: none;
            flex-direction: column;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        .watch-player-wrap.active,
        .listen-player-wrap.active {
            display: flex;
        }

        .watch-player-bar,
        .listen-player-bar {
            padding: 10px 16px;
            background: var(--bg-2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .watch-back {
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
        }

        .watch-back:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        iframe {
            flex: 1;
            border: none;
            width: 100%;
            min-height: 500px;
        }

        .mono-iframe {
            filter: grayscale(100%) contrast(1.1) brightness(0.9);
        }

        #vault-modal {
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border-hover);
            border-radius: var(--radius-lg);
            color: var(--text);
            width: 440px;
            padding: 24px;
            margin: auto;
        }

        #vault-modal::backdrop {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
        }

        #game-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: none;
        }

        .overlay-close {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(15, 15, 15, 0.8);
            color: var(--text);
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            cursor: pointer;
            z-index: 10000;
        }
    </style>
</head>

<body>

    <div id="splash">
        <div class="splash-bg">
            <div class="orb"></div>
            <div class="orb"></div>
            <div class="orb"></div>
        </div>
        <div class="splash-content">
            <div class="splash-logo">STRATO</div>
            <div class="splash-tagline" id="splash-tagline">Altitude too high to block.</div>
            <button class="splash-enter" id="splash-enter">Enter Dashboard</button>
        </div>
    </div>

    <div id="app">
        <div id="topbar">
            <div class="topbar-brand">STRATO <span>// arcade</span></div>
            <div class="search-wrap">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="pInp" placeholder="Search or enter a URL..." autocomplete="off">
            </div>
            <div class="topbar-actions">
                <select id="privacyPreset" class="tb-select" onchange="applyPrivacyPreset()">
                    <option value="default">Cloak</option>
                    <option value="drive">Drive</option>
                    <option value="classroom">Classroom</option>
                </select>
                <button class="tb-btn danger" onclick="panic()">Panic</button>
            </div>
        </div>

        <div id="content">
            <div id="view-grid" class="view active">
                <div class="view-header">Games</div>
                <div class="game-grid" id="grid"></div>
            </div>

            <div id="view-watch" class="view">
                <div id="watch-choice" class="watch-launcher">
                    <div class="view-header">Watch</div>
                    <div class="watch-card" onclick="launchWatch('https://www.cineby.sc/', 'Cineby')">
                        <div class="watch-label">Cineby</div>
                        <div class="watch-desc">Movies & TV Shows</div>
                    </div>
                </div>
                <div id="watch-player" class="watch-player-wrap">
                    <div class="watch-player-bar">
                        <button class="watch-back" onclick="backToWatchChoice()">Back</button>
                        <div class="watch-title" id="watch-player-title">Loading...</div>
                    </div>
                    <iframe id="watch-iframe" allowfullscreen></iframe>
                </div>
            </div>

            <div id="view-listen" class="view">
                <div id="listen-choice" class="listen-launcher">
                    <div class="view-header">Listen</div>
                    <div class="watch-card" onclick="launchListen('mono')">
                        <div class="watch-label">Monochrome</div>
                        <div class="watch-desc">AI-curated music streams</div>
                    </div>
                    <div class="watch-card" onclick="launchListen('spotify-proxy')">
                        <div class="watch-label">Spotify</div>
                        <div class="watch-desc">Full Spotify via proxy</div>
                    </div>
                </div>
                <div id="listen-player" class="listen-player-wrap">
                    <div class="listen-player-bar">
                        <button class="watch-back" onclick="backToListenChoice()">Back</button>
                        <div class="watch-title" id="listen-player-title">Loading...</div>
                    </div>
                    <iframe id="listen-iframe"></iframe>
                </div>
            </div>

            <div id="view-browse" class="view">
                <div class="browse-center">
                    <div class="view-header">Browse Freely</div>
                    <div class="watch-desc">Type any URL in the search bar above to navigate through the proxy.</div>
                </div>
            </div>
        </div>

        <div id="dock">
            <div class="dock-item active" data-view="grid" onclick="switchView('grid')">🎮</div>
            <div class="dock-item" data-view="watch" onclick="switchView('watch')">📺</div>
            <div class="dock-item" data-view="listen" onclick="switchView('listen')">🎵</div>
            <div class="dock-item" data-view="browse" onclick="switchView('browse')">🌐</div>
        </div>
    </div>

    <dialog id="vault-modal"></dialog>
    <div id="game-overlay">
        <button class="overlay-close" onclick="closeGameOverlay()">Close</button>
        <iframe id="game-iframe"></iframe>
    </div>

    <script src="/save-manager.js"></script>
    <script src="/vault.js"></script>
    <script>
        let proxyReady = true;

        if (typeof initSplash !== 'undefined') {
            initSplash();
        }

        function proxifyUrl(url) {
            if (typeof scramjetController !== 'undefined' && scramjetController) {
                return scramjetController.encodeUrl(url);
            }
            return url;
        }

        const GAMES = window.__GAMES__ || [];
        const searchInput = document.getElementById('pInp');
        const grid = document.getElementById('grid');
        let gameCards = [];

        if (searchInput) {
            searchInput.addEventListener('input', e => {
                const q = e.target.value.toLowerCase();
                if (!document.getElementById('view-grid').classList.contains('active')) switchView('grid');
                gameCards.forEach(c => {
                    c.el.style.display = (c.n.toLowerCase().includes(q) || c.t.toLowerCase().includes(q)) ? '' : 'none';
                });
            });

            searchInput.addEventListener('keydown', e => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const url = searchInput.value.trim();
                    if (!url) return;
                    if (url.includes('.') && !url.includes(' ')) {
                        let target = url;
                        if (!/^https?:\/\//i.test(target)) target = 'https://' + target;
                        window.location.href = proxifyUrl(target);
                        return;
                    }
                    window.location.href = proxifyUrl('https://www.google.com/search?q=' + encodeURIComponent(url));
                }
            });
        }

        if (grid) {
            const frag = document.createDocumentFragment();
            GAMES.forEach(g => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `<div class="game-card-img"><img src="${g.img}" onerror="this.style.display='none'"></div>
                                  <div class="game-card-body"><div class="game-card-name">${g.n}</div><div class="game-card-tag">${g.t}</div></div>`;
                card.addEventListener('click', () => {
                    if (g.u.startsWith('/')) window.location.href = g.u;
                    else window.location.href = proxifyUrl(g.u);
                });
                gameCards.push({ n: g.n, t: g.t, el: card });
                frag.appendChild(card);
            });
            grid.appendChild(frag);
        }

        function panic() { window.location.replace('https://classroom.google.com'); }
        window.addEventListener('keydown', e => { if (e.key === 'Escape') closeGameOverlay(); });

        const splashBtn = document.getElementById('splash-enter');
        if (splashBtn) splashBtn.addEventListener('click', () => {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('app').classList.add('visible');
        });

        function switchView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            document.querySelectorAll('.dock-item').forEach(item => {
                item.classList.toggle('active', item.getAttribute('data-view') === viewId);
            });
        }

        function launchWatch(url, name) {
            document.getElementById('watch-choice').style.display = 'none';
            document.getElementById('watch-player').classList.add('active');
            document.getElementById('watch-iframe').src = proxifyUrl(url);
        }
        function backToWatchChoice() {
            document.getElementById('watch-player').classList.remove('active');
            document.getElementById('watch-iframe').src = 'about:blank';
            document.getElementById('watch-choice').style.display = '';
        }

        function launchListen(mode) {
            document.getElementById('listen-choice').style.display = 'none';
            document.getElementById('listen-player').classList.add('active');
            const iframe = document.getElementById('listen-iframe');
            if (mode === 'mono') { iframe.src = 'https://monochrome.tf'; iframe.classList.add('mono-iframe'); }
            else { iframe.src = proxifyUrl('https://open.spotify.com'); iframe.classList.remove('mono-iframe'); }
        }
        function backToListenChoice() {
            document.getElementById('listen-player').classList.remove('active');
            document.getElementById('listen-iframe').src = 'about:blank';
            document.getElementById('listen-choice').style.display = '';
        }

        function closeGameOverlay() {
            document.getElementById('game-overlay').style.display = 'none';
            document.getElementById('game-iframe').src = 'about:blank';
        }
    </script>
</body>

</html>
