<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strato Omni-Ingester</title>
<style>
/*
   FRUTIGER AERO & TECHNOZEN PERFORMANCE STYLES
   Optimized for low-end hardware (Chromebooks).
*/

:root {
  --cyan: #00e5ff;
  --lime: #39ff14;
  --glass-bg: rgba(10, 30, 40, 0.35);
  --glass-border: rgba(0, 229, 255, 0.3);
  --glass-blur: blur(10px); /* Strictly under 12px for GPU performance */
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background-color: #000;
  color: white;
  overflow: hidden;
  display: flex;
  -webkit-font-smoothing: antialiased;
}

/* Canvas Particle Background */
#particleCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: -1;
  /* Will be filled by canvas API */
}

/* App Layout */
#app {
  display: flex;
  width: 100vw;
  height: 100vh;
  position: relative;
  z-index: 1;
}

/* Sidebar Manager */
#sidebar {
  width: 320px;
  height: 100%;
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border-right: 1px solid var(--glass-border);
  padding: 20px;
  overflow-y: auto;
  transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
  will-change: transform;
  display: flex;
  flex-direction: column;
  box-shadow: 5px 0 20px rgba(0,0,0,0.5);
  z-index: 20;
}

#sidebar.collapsed {
  transform: translateX(-100%);
}

.sidebar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.sidebar-header h2 {
  font-size: 1.2rem;
  color: var(--cyan);
  text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
  letter-spacing: 1px;
}

/* Floating Glass Toggle Button */
#sidebar-toggle {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 10;
  background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid rgba(255,255,255,0.3);
  color: white;
  width: 44px;
  height: 44px;
  border-radius: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.4);
  transform: translateZ(0); /* Force GPU */
  will-change: transform;
  transition: opacity 0.2s, transform 0.2s;
}

#sidebar-toggle:active {
  transform: scale(0.95) translateZ(0);
}

/* Source List */
#source-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.source-item {
  background: rgba(0,0,0,0.4);
  padding: 12px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border: 1px solid rgba(255,255,255,0.05);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
}

.source-info {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding-right: 10px;
}

.source-url {
  font-size: 0.8rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: #e0e0e0;
  font-family: monospace;
}

.status {
  font-size: 0.7rem;
  margin-top: 5px;
  font-weight: bold;
}

.status.green {
  color: var(--lime);
  text-shadow: 0 0 8px rgba(57, 255, 20, 0.4);
}

.status.red {
  color: #ff4444;
  text-shadow: 0 0 8px rgba(255, 68, 68, 0.4);
}

/* Toggle Switch inside Source Items */
.toggle-switch {
  appearance: none;
  width: 44px;
  height: 24px;
  background: rgba(0,0,0,0.6);
  border-radius: 24px;
  position: relative;
  cursor: pointer;
  outline: none;
  border: 1px solid rgba(255,255,255,0.2);
}

.toggle-switch:checked {
  background: var(--cyan);
  border-color: var(--cyan);
  box-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
}

.toggle-switch::before {
  content: '';
  position: absolute;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: white;
  top: 2px;
  left: 2px;
  transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1);
  box-shadow: 0 2px 5px rgba(0,0,0,0.3);
}

.toggle-switch:checked::before {
  transform: translateX(20px);
}

.toggle-switch:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* Main Content Area */
#main-content {
  flex: 1;
  height: 100%;
  padding: 40px;
  overflow-y: auto;
  /* Scrollbar styling */
  scrollbar-width: thin;
  scrollbar-color: var(--cyan) transparent;
}

#main-content::-webkit-scrollbar {
  width: 8px;
}
#main-content::-webkit-scrollbar-thumb {
  background: var(--cyan);
  border-radius: 4px;
}

.grid-header {
  margin-bottom: 30px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.grid-header h1 {
  font-size: 2.5rem;
  font-weight: 300;
  text-transform: uppercase;
  letter-spacing: 2px;
  text-shadow: 0 0 20px rgba(255,255,255,0.3);
}

/* Glassmorphic 3D Grid */
.game-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 25px;
}

.game-card {
  position: relative;
  background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.02) 100%);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  overflow: hidden;
  padding: 15px;
  cursor: pointer;

  /* HARDWARE ACCELERATION (Anti-Melt) */
  transform: translateZ(0);
  will-change: transform, backdrop-filter;
  transition: transform 0.2s ease, opacity 0.2s ease;

  box-shadow: 0 15px 35px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
}

.game-card:hover {
  transform: translateY(-8px) translateZ(0);
}

/* Heavy Specular Highlight at top */
.game-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 45%;
  background: linear-gradient(180deg, rgba(255,255,255,0.25) 0%, transparent 100%);
  pointer-events: none;
  border-radius: 20px 20px 0 0;
}

.game-img {
  width: 100%;
  aspect-ratio: 16/9;
  background: #111;
  border-radius: 12px;
  margin-bottom: 12px;
  object-fit: cover;
  box-shadow: 0 5px 15px rgba(0,0,0,0.5);
}

.game-title {
  font-size: 1.1rem;
  font-weight: 600;
  color: white;
  text-shadow: 0 2px 4px rgba(0,0,0,0.8);
  margin-bottom: 4px;
}

.game-source {
  font-size: 0.8rem;
  color: var(--cyan);
  opacity: 0.8;
}

/* Fullscreen Overlay */
#overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; width: 100vw; height: 100vh;
  z-index: 9999;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

#overlay iframe {
  width: 100%;
  height: 100%;
  border: none;
  background: #000;
}

#close-overlay {
  position: absolute;
  top: 25px;
  right: 25px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.05));
  border: 1px solid rgba(255,255,255,0.3);
  color: white;
  font-size: 32px;
  font-weight: 300;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 10000;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.4);
  transform: translateZ(0);
  will-change: transform;
  transition: transform 0.2s, background 0.2s;
}

#close-overlay:hover {
  background: rgba(255, 68, 68, 0.4);
  transform: scale(1.05) translateZ(0);
}

#close-overlay:active {
  transform: scale(0.95) translateZ(0);
}

/* Responsive */
@media (max-width: 768px) {
  #sidebar {
    position: absolute;
    left: 0;
  }
  #main-content {
    padding: 80px 20px 20px 20px; /* Space for toggle */
  }
}
</style>
</head>
<body>

<!-- High-Perf Canvas Particles -->
<canvas id="particleCanvas"></canvas>

<!-- App Wrap -->
<div id="app">
  <!-- Collapsible Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <h2>Source Arsenal</h2>
      <!-- Inside close button for mobile convenience -->
      <div id="sidebar-close-btn" style="cursor:pointer; opacity:0.7; font-size: 24px;">&times;</div>
    </div>
    <div id="source-list">
      <!-- Generated via JS -->
    </div>
  </aside>

  <!-- Global Toggle Button -->
  <button id="sidebar-toggle" title="Toggle Sidebar">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="12" x2="21" y2="12"></line>
      <line x1="3" y1="6" x2="21" y2="6"></line>
      <line x1="3" y1="18" x2="21" y2="18"></line>
    </svg>
  </button>

  <!-- Main Grid View -->
  <main id="main-content">
    <div class="grid-header">
      <h1>Omni-Ingester</h1>
      <span style="color:var(--cyan); font-weight:bold" id="game-counter">0 Games Loaded</span>
    </div>
    <div class="game-grid" id="game-grid">
      <!-- Cards rendered here -->
    </div>
  </main>
</div>

<!-- Self-Contained Overlay -->
<div id="overlay">
  <button id="close-overlay">&times;</button>
  <iframe id="game-iframe" sandbox="allow-scripts allow-same-origin allow-popups"></iframe>
</div>

<script>
/**
 * STRATO OMNI-INGESTER
 * Data Engine & UI Logic
 */

const RAW_SOURCES = [
  "http://Selenite.cc",
  "https://g-65j.pages.dev/projects",
  "https://fmhy.net/",
  "https://uunnblockedgames.weebly.com/bloons-tower-defense-5---works.html",
  "https://vapor.onl/",
  "https://splash.best/",
  "https://infamous.qzz.io/",
  "https://programming.writing.lecture.learning.literature.mybgarage.cl/",
  "https://chips.moktanram.com.np/g.html",
  "https://tinyurl.com/kingelijah1",
  "https://learn.gls-drone-pilot.com/",
  "https://daydreamx.global.ssl.fastly.net/",
  "https://dtxb.eclipsecastellon.net/",
  "https://s3.amazonaws.com/ghst/index.html",
  "https://school.agreca.com.ar/",
  "https://noterplusbunny52.b-cdn.net/",
  "https://thesymiproject.org/",
  "https://pluh.aletiatours.com/",
  "https://keoffical.oneapp.dev/",
  "https://follownirbytes-ynevj.ns8.org/",
  "https://endis.rest/",
  "https://helptired8.notinthearchives.net/",
  "https://everest.rip/",
  "https://www.korona.lat/",
  "https://play.frogiee.one/",
  "https://ubghub.org/",
  "https://pizagame.com/",
  "https://startmyeducation.top/"
];

// Application State
const state = {
  sources: [],
  games: [],
  activeSources: new Set()
};

// ==========================================
// 1. HARDWARE ACCELERATED PARTICLES (Canvas)
// ==========================================
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d', { alpha: false }); // alpha: false forces opaque background, optimizing composite
let width, height;
const particles = [];

function resizeCanvas() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
  updateGradient();
}
window.addEventListener('resize', resizeCanvas);

let bgGradient;
function updateGradient() {
  // Technozen gradient: deep cyan to dark forest
  bgGradient = ctx.createLinearGradient(0, 0, width, height);
  bgGradient.addColorStop(0, '#001a2c');
  bgGradient.addColorStop(1, '#002618');
}

class Particle {
  constructor() {
    this.reset();
    this.y = Math.random() * height; // initial scatter
  }
  reset() {
    this.x = Math.random() * width;
    this.y = height + Math.random() * 100;
    this.r = Math.random() * 3 + 1;
    this.vx = (Math.random() - 0.5) * 0.4;
    this.vy = -Math.random() * 1.5 - 0.5;

    // Frutiger Aero / Technozen Palette
    const isCyan = Math.random() > 0.5;
    this.color = isCyan ? 'rgba(0, 229, 255, 0.4)' : 'rgba(57, 255, 20, 0.3)';
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;

    // Reset if out of bounds
    if (this.y + this.r < 0) this.reset();
    if (this.x > width + this.r) this.x = -this.r;
    if (this.x < -this.r) this.x = width + this.r;
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.fill();
  }
}

// Generate particles
for (let i = 0; i < 80; i++) particles.push(new Particle());

function renderCanvas() {
  ctx.fillStyle = bgGradient;
  ctx.fillRect(0, 0, width, height);

  for (let i = 0; i < particles.length; i++) {
    particles[i].update();
    particles[i].draw();
  }
  requestAnimationFrame(renderCanvas);
}
// Init canvas
resizeCanvas();
renderCanvas();

// ==========================================
// 2. UI LOGIC (Sidebar & Toggle)
// ==========================================
const sidebar = document.getElementById('sidebar');
const toggleBtn = document.getElementById('sidebar-toggle');
const closeSidebarBtn = document.getElementById('sidebar-close-btn');

let isSidebarOpen = true;

function syncSidebarState() {
  if (isSidebarOpen) {
    sidebar.classList.remove('collapsed');
    toggleBtn.style.opacity = '0'; // Hide toggle when sidebar is open
    toggleBtn.style.pointerEvents = 'none';
  } else {
    sidebar.classList.add('collapsed');
    toggleBtn.style.opacity = '1';
    toggleBtn.style.pointerEvents = 'auto';
  }
}

// Auto-collapse on small screens
if (window.innerWidth < 900) {
  isSidebarOpen = false;
  syncSidebarState();
}

toggleBtn.addEventListener('click', () => {
  isSidebarOpen = true;
  syncSidebarState();
});

closeSidebarBtn.addEventListener('click', () => {
  isSidebarOpen = false;
  syncSidebarState();
});

// ==========================================
// 3. DATA ENGINE
// ==========================================
function getMockGames(sourceUrl) {
  const games = [];
  const baseNames = ['Geometry Dash', '1v1.LOL', 'Minecraft', 'Subway Surfers', 'Retro Bowl', 'Monkey Mart', 'Tunnel Rush', 'BitLife'];
  const domain = new URL(sourceUrl).hostname;

  for (let i = 0; i < 6; i++) {
    games.push({
      id: Math.random().toString(36).substr(2, 9),
      title: `${baseNames[Math.floor(Math.random() * baseNames.length)]} (${domain})`,
      url: 'https://example.com/play',
      source: sourceUrl,
      img: `https://picsum.photos/400/225?random=${Math.random()}`
    });
  }
  return games;
}

async function fetchLibrary(url) {
  // Hardcoded mock for the "Big Three"
  const isBigThree = url.includes('Selenite.cc') ||
                     url.includes('g-65j.pages.dev') ||
                     url.includes('frogiee.one');

  if (isBigThree) {
    // Simulate network latency
    await new Promise(r => setTimeout(r, 600));
    return { status: 'success', games: getMockGames(url) };
  }

  // Real fetch attempt wrapped in try/catch
  try {
    const res = await fetch(url, { mode: 'cors' });
    const text = await res.text();

    // If it returns HTML, flag it for backend proxy
    if (text.trim().toLowerCase().startsWith('<!doctype html>') || text.includes('<html')) {
        throw new Error('Returned HTML instead of JSON');
    }

    const data = JSON.parse(text);
    return { status: 'success', games: data.games || [] };
  } catch (err) {
    // Fails naturally due to CORS or returning HTML payload
    return { status: 'error', reason: 'Requires Backend Proxy' };
  }
}

// ==========================================
// 4. RENDERING (Batch Updates)
// ==========================================
const sourceListEl = document.getElementById('source-list');
const gameGridEl = document.getElementById('game-grid');
const counterEl = document.getElementById('game-counter');

function renderSources() {
  // Batch DOM writes via Fragment
  const fragment = document.createDocumentFragment();

  state.sources.forEach(src => {
    const el = document.createElement('div');
    el.className = 'source-item';

    const info = document.createElement('div');
    info.className = 'source-info';

    const urlEl = document.createElement('div');
    urlEl.className = 'source-url';
    urlEl.textContent = src.url.replace(/^https?:\/\//, ''); // Clean URL for display

    const statusEl = document.createElement('div');
    const isSuccess = src.status === 'success';
    statusEl.className = 'status ' + (isSuccess ? 'green' : 'red');
    statusEl.textContent = isSuccess ? '● CONNECTED' : '● REQUIRES BACKEND PROXY';

    info.appendChild(urlEl);
    info.appendChild(statusEl);

    const toggle = document.createElement('input');
    toggle.type = 'checkbox';
    toggle.className = 'toggle-switch';
    toggle.checked = state.activeSources.has(src.url);
    toggle.disabled = !isSuccess;

    toggle.addEventListener('change', (e) => {
      if (e.target.checked) {
        state.activeSources.add(src.url);
      } else {
        state.activeSources.delete(src.url);
      }
      renderGames();
    });

    el.appendChild(info);
    el.appendChild(toggle);
    fragment.appendChild(el);
  });

  sourceListEl.innerHTML = '';
  sourceListEl.appendChild(fragment);
}

function renderGames() {
  const fragment = document.createDocumentFragment();

  const visibleGames = state.games.filter(g => state.activeSources.has(g.source));

  visibleGames.forEach(game => {
    const card = document.createElement('div');
    card.className = 'game-card';

    const img = document.createElement('img');
    img.className = 'game-img';
    img.src = game.img;
    img.loading = 'lazy';
    img.alt = game.title;

    const title = document.createElement('div');
    title.className = 'game-title';
    title.textContent = game.title;

    const srcLabel = document.createElement('div');
    srcLabel.className = 'game-source';
    srcLabel.textContent = new URL(game.source).hostname;

    card.appendChild(img);
    card.appendChild(title);
    card.appendChild(srcLabel);

    card.addEventListener('click', () => openGame(game.url));

    fragment.appendChild(card);
  });

  gameGridEl.innerHTML = '';
  gameGridEl.appendChild(fragment);
  counterEl.textContent = `${visibleGames.length} Games Loaded`;
}

// ==========================================
// 5. OVERLAY LOGIC
// ==========================================
const overlay = document.getElementById('overlay');
const closeBtn = document.getElementById('close-overlay');
const iframe = document.getElementById('game-iframe');

function openGame(url) {
  iframe.src = url;
  overlay.style.display = 'block';
}

closeBtn.addEventListener('click', () => {
  overlay.style.display = 'none';
  iframe.src = '';
});

// ==========================================
// BOOTSTRAP
// ==========================================
async function init() {
  syncSidebarState();

  // Initialize sources array to keep track of statuses
  state.sources = RAW_SOURCES.map(url => ({ url, status: 'loading' }));
  renderSources();

  // Fetch everything in parallel but update UI incrementally
  RAW_SOURCES.forEach(async (url) => {
    const result = await fetchLibrary(url);

    // Find and update the source
    const srcIndex = state.sources.findIndex(s => s.url === url);
    if (srcIndex !== -1) {
      state.sources[srcIndex].status = result.status;
    }

    if (result.status === 'success') {
      state.games.push(...result.games);
      state.activeSources.add(url);
    }

    // Sort sources so successful ones are at the top, then rendering
    state.sources.sort((a, b) => {
      if (a.status === 'success' && b.status !== 'success') return -1;
      if (a.status !== 'success' && b.status === 'success') return 1;
      return 0;
    });

    renderSources();
    renderGames();
  });
}

init();

</script>
</body>
</html>
