<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a1a">
  <title>STRATO | Mission Control</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .admin-auth-overlay {
      position: fixed; inset: 0;
      background: rgba(10, 10, 26, 0.9);
      backdrop-filter: blur(20px);
      z-index: 1000;
      display: flex; align-items: center; justify-content: center;
    }
    .admin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
      margin-top: 2rem;
    }
    .quarantine-card {
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .q-meta {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.8rem; opacity: 0.7;
    }
    .q-title {
      font-size: 1.25rem; font-weight: 600;
      margin: 0; color: #fff;
    }
    .q-url {
      font-size: 0.85rem; color: var(--accent);
      word-break: break-all;
      font-family: monospace;
    }
    .q-reason {
      font-size: 0.85rem;
      background: rgba(255, 82, 82, 0.1);
      color: #ff5252;
      padding: 0.5rem;
      border-radius: 4px;
    }
    .q-actions {
      display: flex; gap: 0.5rem; margin-top: auto; padding-top: 1rem;
    }
    .q-actions button {
      flex: 1;
      padding: 0.5rem;
    }
    .pulse-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem; margin-bottom: 2rem;
    }
    .pulse-stat {
      text-align: center;
      padding: 1.5rem;
    }
    .pulse-value {
      font-size: 2.5rem; font-weight: 700; color: var(--accent);
    }
    .pulse-label {
      font-size: 0.9rem; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px;
    }
  </style>
</head>
<body data-theme="cyan">

  <!-- BACKGROUND LAYERS -->
  <div id="bg-layers">
    <div class="bg-grid"></div>
    <div class="bg-scanlines"></div>
  </div>

  <!-- AUTHENTICATION OVERLAY -->
  <div id="admin-auth" class="admin-auth-overlay">
    <div class="glass-card" style="width: 100%; max-width: 400px; padding: 2rem;">
      <h2 style="margin-bottom: 0.5rem;">Mission Control</h2>
      <p style="opacity: 0.7; margin-bottom: 1.5rem;">Enter Admin Secret to access Source Hydra.</p>
      <input type="password" id="admin-secret-input" class="glass-input" placeholder="Admin Secret" style="margin-bottom: 1rem;">
      <button id="btn-admin-login" class="glass-btn" style="width: 100%;">Authenticate</button>
      <p id="admin-auth-error" style="color: #ff5252; font-size: 0.85rem; margin-top: 1rem; display: none;">Invalid credentials</p>
    </div>
  </div>

  <!-- MAIN ADMIN APP -->
  <div id="app" class="app" style="opacity: 0; pointer-events: none; transition: opacity 0.3s ease;">

    <nav class="topbar">
      <div class="topbar-brand">
        <span class="logo-text">STRATO</span>
        <span class="logo-version">Mission Control</span>
      </div>
      <div class="topbar-actions">
        <button class="topbar-action" id="btn-logout" title="Logout">🚪</button>
      </div>
    </nav>

    <main class="main-content" style="padding: 2rem; max-width: 1200px; margin: 0 auto; overflow-y: auto;">

      <section class="hideout-section">
        <div class="home-section-head">
          <div>
            <p class="section-eyebrow">Source Hydra Intelligence</p>
            <h2 class="section-title">Catalog Pulse</h2>
          </div>
        </div>

        <div class="pulse-grid">
          <div class="glass-card pulse-stat">
            <div class="pulse-value" id="pulse-healthy">--</div>
            <div class="pulse-label">Trust Signals</div>
          </div>
          <div class="glass-card pulse-stat">
            <div class="pulse-value" id="pulse-quarantine">--</div>
            <div class="pulse-label">In Quarantine</div>
          </div>
          <div class="glass-card pulse-stat">
            <div class="pulse-value" id="pulse-mirrors">--</div>
            <div class="pulse-label">Mirror Clusters</div>
          </div>
        </div>
      </section>

      <section class="hideout-section">
        <div class="home-section-head">
          <div>
            <p class="section-eyebrow">Pending Review</p>
            <h2 class="section-title">Quarantine Bay</h2>
          </div>
          <button class="glass-btn" id="btn-refresh-bay" style="padding: 0.4rem 1rem;">Refresh</button>
        </div>

        <div id="quarantine-empty" class="hidden" style="text-align: center; padding: 3rem; opacity: 0.7;">
          <h3>Bay is clear.</h3>
          <p>No new sources pending review.</p>
        </div>

        <div id="quarantine-grid" class="admin-grid">
          <!-- Populated by JS -->
        </div>
      </section>

    </main>

    <!-- TOAST CONTAINER -->
    <div class="toast-container" id="toast-container"></div>
  </div>

  <script type="module" src="/js/admin.js"></script>
</body>
</html>
