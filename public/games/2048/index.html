<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 - STRATO Games</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a1e; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 10px; overflow: hidden; }
h1 { color: #00e5ff; font-size: clamp(24px, 5vw, 40px); margin: 10px 0; text-shadow: 0 0 20px rgba(0,229,255,0.5); }
.info { display: flex; gap: 20px; margin: 10px 0; flex-wrap: wrap; justify-content: center; }
.score-box { background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.3); border-radius: 8px; padding: 8px 20px; text-align: center; }
.score-box .label { font-size: 12px; color: #00e5ff; text-transform: uppercase; letter-spacing: 2px; }
.score-box .value { font-size: 24px; font-weight: bold; }
canvas { border-radius: 8px; margin: 10px 0; touch-action: none; }
.controls { color: #667; font-size: 13px; text-align: center; margin-top: 8px; }
.controls span { color: #00e5ff; }
button { background: rgba(0,229,255,0.15); color: #00e5ff; border: 1px solid rgba(0,229,255,0.4); padding: 10px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; margin: 5px; transition: all 0.2s; }
button:hover { background: rgba(0,229,255,0.3); }
.overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,10,30,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
.overlay h2 { font-size: 36px; color: #00e5ff; margin-bottom: 10px; text-shadow: 0 0 20px rgba(0,229,255,0.5); }
.overlay p { font-size: 18px; margin-bottom: 20px; color: #aac; }
.hidden { display: none; }
</style>
<script src="/games/strato-game-shell.js" defer></script>
</head>
<body>
<h1>2048</h1>
<div class="info">
  <div class="score-box"><div class="label">Score</div><div class="value" id="score">0</div></div>
  <div class="score-box"><div class="label">Best</div><div class="value" id="best">0</div></div>
</div>
<canvas id="game"></canvas>
<div class="controls"><span>Arrow Keys</span> or <span>WASD</span> to move tiles</div>
<div class="overlay" id="startScreen">
  <h2>2048</h2>
  <p>Slide and merge tiles to reach 2048!</p>
  <button data-action="start-game">Play</button>
</div>
<div class="overlay hidden" id="gameOverScreen">
  <h2 id="endTitle">Game Over</h2>
  <p id="endScore">Score: 0</p>
  <button data-action="start-game">Try Again</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const GRID = 4;
const GAP = 8;
let SIZE, CELL;
let grid, score, best = 0, gameActive = false, won = false;

function resize() {
  SIZE = Math.min(window.innerWidth - 20, window.innerHeight - 200, 500);
  canvas.width = canvas.height = SIZE;
  CELL = (SIZE - GAP * (GRID + 1)) / GRID;
  if (gameActive) draw();
}
window.addEventListener('resize', resize);
resize();

const COLORS = {
  0: 'rgba(255,255,255,0.05)', 2: '#1a3a4a', 4: '#1a4a5a', 8: '#1a5a3a',
  16: '#2a6a2a', 32: '#3a7a1a', 64: '#5a8a0a', 128: '#7a9a00',
  256: '#9aaa00', 512: '#baba00', 1024: '#daca00', 2048: '#00e5ff'
};
const TEXT_COLORS = {
  0: 'transparent', 2: '#00e5ff', 4: '#00e5ff', 8: '#00ff88',
  16: '#00ff88', 32: '#aaff00', 64: '#aaff00', 128: '#ffff00',
  256: '#ffff00', 512: '#ffff00', 1024: '#ffff00', 2048: '#0a0a1e'
};

function draw() {
  ctx.fillStyle = '#0d0d2a';
  ctx.fillRect(0, 0, SIZE, SIZE);
  for (let r = 0; r < GRID; r++) {
    for (let c = 0; c < GRID; c++) {
      const x = GAP + c * (CELL + GAP);
      const y = GAP + r * (CELL + GAP);
      const val = grid[r][c];
      const key = val > 2048 ? 2048 : val;
      ctx.fillStyle = COLORS[key] || '#00e5ff';
      ctx.beginPath();
      ctx.roundRect(x, y, CELL, CELL, 6);
      ctx.fill();
      if (val) {
        ctx.fillStyle = TEXT_COLORS[key] || '#0a0a1e';
        const fontSize = val >= 1024 ? CELL * 0.28 : val >= 128 ? CELL * 0.32 : CELL * 0.4;
        ctx.font = `bold ${fontSize}px 'Segoe UI', sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(val, x + CELL / 2, y + CELL / 2);
        if (val >= 2048 && !won) { won = true; showEnd('You Win!', true); }
      }
    }
  }
}

function init() {
  grid = Array.from({ length: GRID }, () => Array(GRID).fill(0));
  score = 0; won = false;
  addTile(); addTile();
  document.getElementById('score').textContent = score;
  draw();
}

function addTile() {
  const empty = [];
  for (let r = 0; r < GRID; r++)
    for (let c = 0; c < GRID; c++)
      if (!grid[r][c]) empty.push([r, c]);
  if (!empty.length) return;
  const [r, c] = empty[Math.floor(Math.random() * empty.length)];
  grid[r][c] = Math.random() < 0.9 ? 2 : 4;
}

function slide(row) {
  let arr = row.filter(v => v);
  for (let i = 0; i < arr.length - 1; i++) {
    if (arr[i] === arr[i + 1]) {
      arr[i] *= 2; score += arr[i]; arr[i + 1] = 0;
    }
  }
  arr = arr.filter(v => v);
  while (arr.length < GRID) arr.push(0);
  return arr;
}

function move(dir) {
  if (!gameActive) return;
  const prev = JSON.stringify(grid);
  if (dir === 'left') grid = grid.map(r => slide(r));
  else if (dir === 'right') grid = grid.map(r => slide(r.reverse()).reverse());
  else if (dir === 'up') {
    for (let c = 0; c < GRID; c++) {
      let col = grid.map(r => r[c]);
      col = slide(col);
      for (let r = 0; r < GRID; r++) grid[r][c] = col[r];
    }
  } else if (dir === 'down') {
    for (let c = 0; c < GRID; c++) {
      let col = grid.map(r => r[c]).reverse();
      col = slide(col).reverse();
      for (let r = 0; r < GRID; r++) grid[r][c] = col[r];
    }
  }
  if (JSON.stringify(grid) !== prev) {
    addTile();
    document.getElementById('score').textContent = score;
    if (score > best) { best = score; document.getElementById('best').textContent = best; }
    draw();
    if (isGameOver()) showEnd('Game Over!', false);
  }
}

function isGameOver() {
  for (let r = 0; r < GRID; r++)
    for (let c = 0; c < GRID; c++) {
      if (!grid[r][c]) return false;
      if (c < GRID - 1 && grid[r][c] === grid[r][c + 1]) return false;
      if (r < GRID - 1 && grid[r][c] === grid[r + 1][c]) return false;
    }
  return true;
}

function showEnd(title, isWin) {
  gameActive = false;
  document.getElementById('endTitle').textContent = title;
  document.getElementById('endScore').textContent = 'Score: ' + score;
  document.getElementById('gameOverScreen').classList.remove('hidden');
}

function startGame() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  gameActive = true;
  init();
}

document.addEventListener('keydown', e => {
  const map = { ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down', a: 'left', d: 'right', w: 'up', s: 'down' };
  if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
});

let touchStart = null;
canvas.addEventListener('touchstart', e => { touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY }; });
canvas.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
  else move(dy > 0 ? 'down' : 'up');
  touchStart = null;
});
</script>
</body>
</html>
