<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTEROIDS | STRATO Games</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1e; color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; overflow: hidden;
  }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; max-width: 700px; padding: 12px 20px;
  }
  .back-btn {
    background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.3);
    color: #00e5ff; padding: 8px 16px; border-radius: 8px; cursor: pointer;
    font-family: inherit; font-size: 14px; transition: all 0.3s;
  }
  .back-btn:hover { background: rgba(0,229,255,0.25); }
  .game-title {
    font-size: 22px; font-weight: 700; color: #00e5ff;
    text-shadow: 0 0 20px rgba(0,229,255,0.5);
  }
  .score-bar { display: flex; gap: 30px; margin-bottom: 8px; font-size: 16px; color: #aaa; }
  .score-bar span { color: #00e5ff; font-weight: 700; }
  .game-container {
    background: rgba(255,255,255,0.03); border: 1px solid rgba(0,229,255,0.15);
    border-radius: 16px; padding: 8px; backdrop-filter: blur(10px);
  }
  canvas { display: block; border-radius: 8px; }
  .controls-hint { margin-top: 8px; font-size: 13px; color: #666; text-align: center; }
</style>
</head>
<body>
  <div class="header">
    <button class="back-btn" onclick="history.back();">&#8592; STRATO</button>
    <div class="game-title">ASTEROIDS</div>
  </div>
  <div class="score-bar">
    <div>Score: <span id="scoreEl">0</span></div>
    <div>Lives: <span id="livesEl">3</span></div>
    <div>Level: <span id="levelEl">1</span></div>
  </div>
  <div class="game-container">
    <canvas id="game" width="660" height="480"></canvas>
  </div>
  <div class="controls-hint">W/&#9650; Thrust &nbsp; A/&#9664; Left &nbsp; D/&#9654; Right &nbsp; Space Shoot</div>

<script>
/* ==================== ASTEROIDS — STRATO Edition ==================== */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

let score, lives, level, ship, asteroids, bullets, particles;
let keys = {}, gameOver, respawnTimer;

const SHIP_SIZE = 16, BULLET_SPEED = 8, BULLET_LIFE = 55;
const FRICTION = 0.985, THRUST = 0.18, TURN_SPEED = 0.065;

function initGame() {
  score = 0; lives = 3; level = 1; gameOver = false; respawnTimer = 0;
  ship = { x: W/2, y: H/2, vx: 0, vy: 0, angle: -Math.PI/2, thrusting: false, invincible: 90 };
  asteroids = []; bullets = []; particles = [];
  spawnAsteroids(4);
  updateUI();
}

function spawnAsteroids(count) {
  for (let i = 0; i < count; i++) {
    let x, y;
    do { x = Math.random() * W; y = Math.random() * H; }
    while (dist(x, y, ship.x, ship.y) < 120);
    asteroids.push(makeAsteroid(x, y, 3));
  }
}

function makeAsteroid(x, y, size) {
  const r = [0, 12, 24, 44][size];
  const speed = (0.5 + Math.random() * 1.5) * (4 - size) * 0.5;
  const angle = Math.random() * Math.PI * 2;
  // Jagged shape
  const verts = [];
  const n = 8 + Math.floor(Math.random() * 5);
  for (let i = 0; i < n; i++) {
    const a = (i / n) * Math.PI * 2;
    const jitter = r * (0.7 + Math.random() * 0.35);
    verts.push({ x: Math.cos(a) * jitter, y: Math.sin(a) * jitter });
  }
  return { x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, size, r, verts };
}

function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }

function wrap(obj) {
  if (obj.x < -50) obj.x += W + 100;
  if (obj.x > W + 50) obj.x -= W + 100;
  if (obj.y < -50) obj.y += H + 100;
  if (obj.y > H + 50) obj.y -= H + 100;
}

function updateUI() {
  document.getElementById('scoreEl').textContent = score;
  document.getElementById('livesEl').textContent = lives;
  document.getElementById('levelEl').textContent = level;
}

// Input
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => keys[e.code] = false);

// Touch controls
let touchState = { left: false, right: false, thrust: false, shoot: false };

function addTouchBtn(id, key) {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('touchstart', e => { e.preventDefault(); keys[key] = true; });
  el.addEventListener('touchend', e => { e.preventDefault(); keys[key] = false; });
}

function update() {
  if (gameOver) return;

  // Ship controls
  if (ship) {
    if (keys['ArrowLeft'] || keys['KeyA']) ship.angle -= TURN_SPEED;
    if (keys['ArrowRight'] || keys['KeyD']) ship.angle += TURN_SPEED;
    ship.thrusting = keys['ArrowUp'] || keys['KeyW'];
    if (ship.thrusting) {
      ship.vx += Math.cos(ship.angle) * THRUST;
      ship.vy += Math.sin(ship.angle) * THRUST;
      // Exhaust particles
      for (let i = 0; i < 2; i++) {
        particles.push({
          x: ship.x - Math.cos(ship.angle) * SHIP_SIZE,
          y: ship.y - Math.sin(ship.angle) * SHIP_SIZE,
          vx: -Math.cos(ship.angle) * (1 + Math.random()*2) + (Math.random()-0.5),
          vy: -Math.sin(ship.angle) * (1 + Math.random()*2) + (Math.random()-0.5),
          life: 15 + Math.random()*10, maxLife: 25, color: Math.random() > 0.5 ? '#00e5ff' : '#ff8800'
        });
      }
    }
    ship.vx *= FRICTION; ship.vy *= FRICTION;
    ship.x += ship.vx; ship.y += ship.vy;
    wrap(ship);
    if (ship.invincible > 0) ship.invincible--;

    // Shoot
    if (keys['Space'] && bullets.length < 6) {
      keys['Space'] = false; // debounce
      bullets.push({
        x: ship.x + Math.cos(ship.angle) * SHIP_SIZE,
        y: ship.y + Math.sin(ship.angle) * SHIP_SIZE,
        vx: Math.cos(ship.angle) * BULLET_SPEED + ship.vx * 0.3,
        vy: Math.sin(ship.angle) * BULLET_SPEED + ship.vy * 0.3,
        life: BULLET_LIFE
      });
    }
  }

  // Bullets
  bullets.forEach(b => { b.x += b.vx; b.y += b.vy; b.life--; wrap(b); });
  bullets = bullets.filter(b => b.life > 0);

  // Asteroids
  asteroids.forEach(a => { a.x += a.vx; a.y += a.vy; wrap(a); });

  // Bullet-Asteroid collision
  const newAsteroids = [];
  asteroids = asteroids.filter(a => {
    for (let i = 0; i < bullets.length; i++) {
      const b = bullets[i];
      if (dist(b.x, b.y, a.x, a.y) < a.r) {
        bullets.splice(i, 1);
        score += [0, 100, 50, 25][a.size];
        updateUI();
        // Spawn smaller asteroids
        if (a.size > 1) {
          for (let j = 0; j < 2; j++) newAsteroids.push(makeAsteroid(a.x, a.y, a.size - 1));
        }
        // Explosion particles
        for (let j = 0; j < 8; j++) {
          const ang = Math.random() * Math.PI * 2;
          particles.push({
            x: a.x, y: a.y, vx: Math.cos(ang)*(1+Math.random()*2), vy: Math.sin(ang)*(1+Math.random()*2),
            life: 20+Math.random()*15, maxLife: 35, color: '#00e5ff'
          });
        }
        return false;
      }
    }
    return true;
  });
  asteroids.push(...newAsteroids);

  // Ship-Asteroid collision
  if (ship && ship.invincible <= 0) {
    for (const a of asteroids) {
      if (dist(ship.x, ship.y, a.x, a.y) < a.r + SHIP_SIZE * 0.6) {
        lives--; updateUI();
        // Death particles
        for (let i = 0; i < 20; i++) {
          const ang = Math.random() * Math.PI * 2;
          particles.push({
            x: ship.x, y: ship.y, vx: Math.cos(ang)*(1+Math.random()*3), vy: Math.sin(ang)*(1+Math.random()*3),
            life: 25+Math.random()*20, maxLife: 45, color: '#ff4444'
          });
        }
        if (lives <= 0) { gameOver = true; ship = null; }
        else { respawnTimer = 90; ship = null; }
        break;
      }
    }
  }

  // Respawn
  if (ship === null && respawnTimer > 0) {
    respawnTimer--;
    if (respawnTimer === 0) {
      ship = { x: W/2, y: H/2, vx: 0, vy: 0, angle: -Math.PI/2, thrusting: false, invincible: 120 };
    }
  }

  // Particles
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vx *= 0.97; p.vy *= 0.97; p.life--; });
  particles = particles.filter(p => p.life > 0);

  // Next level
  if (asteroids.length === 0) {
    level++; updateUI();
    spawnAsteroids(3 + level);
  }
}

function draw() {
  ctx.fillStyle = '#0a0a1e';
  ctx.fillRect(0, 0, W, H);

  // Stars background
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  for (let i = 0; i < 60; i++) {
    const sx = (i * 137.5) % W, sy = (i * 97.3) % H;
    ctx.fillRect(sx, sy, 1, 1);
  }

  // Ship
  if (ship) {
    const s = ship;
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.angle);
    // Blinking when invincible
    if (s.invincible > 0 && Math.floor(s.invincible / 5) % 2) { ctx.restore(); }
    else {
      ctx.strokeStyle = '#00e5ff';
      ctx.shadowColor = '#00e5ff'; ctx.shadowBlur = 10;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(SHIP_SIZE, 0);
      ctx.lineTo(-SHIP_SIZE * 0.7, -SHIP_SIZE * 0.6);
      ctx.lineTo(-SHIP_SIZE * 0.4, 0);
      ctx.lineTo(-SHIP_SIZE * 0.7, SHIP_SIZE * 0.6);
      ctx.closePath();
      ctx.stroke();
      // Thrust flame
      if (s.thrusting) {
        ctx.strokeStyle = '#ff8800';
        ctx.shadowColor = '#ff8800';
        ctx.beginPath();
        ctx.moveTo(-SHIP_SIZE * 0.5, -4);
        ctx.lineTo(-SHIP_SIZE * (0.9 + Math.random()*0.5), 0);
        ctx.lineTo(-SHIP_SIZE * 0.5, 4);
        ctx.stroke();
      }
      ctx.shadowBlur = 0;
      ctx.restore();
    }
  }

  // Bullets
  bullets.forEach(b => {
    ctx.fillStyle = '#00e5ff';
    ctx.shadowColor = '#00e5ff'; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(b.x, b.y, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  });

  // Asteroids
  asteroids.forEach(a => {
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.strokeStyle = 'rgba(0,229,255,0.6)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(a.verts[0].x, a.verts[0].y);
    for (let i = 1; i < a.verts.length; i++) ctx.lineTo(a.verts[i].x, a.verts[i].y);
    ctx.closePath();
    ctx.stroke();
    ctx.fillStyle = 'rgba(0,229,255,0.05)';
    ctx.fill();
    ctx.restore();
  });

  // Particles
  particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = alpha;
    ctx.beginPath(); ctx.arc(p.x, p.y, 1.5, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Game over overlay
  if (gameOver) {
    ctx.fillStyle = 'rgba(10,10,30,0.8)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 40px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#ff4444'; ctx.shadowBlur = 20;
    ctx.fillText('GAME OVER', W/2, H/2 - 10);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#aaa';
    ctx.font = '18px "Segoe UI", system-ui, sans-serif';
    ctx.fillText('Press R to restart', W/2, H/2 + 30);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

document.addEventListener('keydown', e => {
  if ((e.key === 'r' || e.key === 'R') && gameOver) initGame();
});

initGame();
loop();
</script>
</body>
</html>
