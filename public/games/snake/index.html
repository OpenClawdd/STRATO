<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake - STRATO Games</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a1e; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 10px; overflow: hidden; }
h1 { color: #00e5ff; font-size: clamp(24px, 5vw, 40px); margin: 10px 0; text-shadow: 0 0 20px rgba(0,229,255,0.5); }
.info { display: flex; gap: 20px; margin: 10px 0; flex-wrap: wrap; justify-content: center; }
.score-box { background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.3); border-radius: 8px; padding: 8px 20px; text-align: center; }
.score-box .label { font-size: 12px; color: #00e5ff; text-transform: uppercase; letter-spacing: 2px; }
.score-box .value { font-size: 24px; font-weight: bold; }
canvas { border-radius: 4px; border: 1px solid rgba(0,229,255,0.2); margin: 10px 0; }
.controls { color: #667; font-size: 13px; text-align: center; margin-top: 8px; }
.controls span { color: #00e5ff; }
button { background: rgba(0,229,255,0.15); color: #00e5ff; border: 1px solid rgba(0,229,255,0.4); padding: 10px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; margin: 5px; transition: all 0.2s; }
button:hover { background: rgba(0,229,255,0.3); }
.overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,10,30,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
.overlay h2 { font-size: 36px; color: #00e5ff; margin-bottom: 10px; text-shadow: 0 0 20px rgba(0,229,255,0.5); }
.overlay p { font-size: 18px; margin-bottom: 20px; color: #aac; }
.hidden { display: none; }
</style>
</head>
<body>
<h1>SNAKE</h1>
<div class="info">
  <div class="score-box"><div class="label">Score</div><div class="value" id="score">0</div></div>
  <div class="score-box"><div class="label">Best</div><div class="value" id="best">0</div></div>
</div>
<canvas id="game"></canvas>
<div class="controls"><span>Arrow Keys</span> or <span>WASD</span> to move | <span>P</span> Pause</div>
<div class="overlay" id="startScreen">
  <h2>SNAKE</h2>
  <p>Eat food, grow longer, don't crash!</p>
  <button onclick="startGame()">Play</button>
</div>
<div class="overlay hidden" id="gameOverScreen">
  <h2>Game Over</h2>
  <p id="finalScore">Score: 0</p>
  <button onclick="startGame()">Try Again</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const GRID = 20;
let CELL, SIZE, snake, dir, nextDir, food, score, best = 0, gameActive = false, paused = false, speed, timer;

function resize() {
  SIZE = Math.min(window.innerWidth - 20, window.innerHeight - 200, 500);
  CELL = Math.floor(SIZE / GRID);
  SIZE = CELL * GRID;
  canvas.width = canvas.height = SIZE;
  if (gameActive) draw();
}
window.addEventListener('resize', resize);
resize();

function startGame() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  const mid = Math.floor(GRID / 2);
  snake = [{ x: mid, y: mid }, { x: mid - 1, y: mid }, { x: mid - 2, y: mid }];
  dir = { x: 1, y: 0 }; nextDir = { x: 1, y: 0 };
  score = 0; speed = 120; paused = false;
  document.getElementById('score').textContent = 0;
  placeFood();
  gameActive = true;
  clearInterval(timer);
  timer = setInterval(update, speed);
  draw();
}

function placeFood() {
  do {
    food = { x: Math.floor(Math.random() * GRID), y: Math.floor(Math.random() * GRID) };
  } while (snake.some(s => s.x === food.x && s.y === food.y));
}

function update() {
  if (!gameActive || paused) return;
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID || snake.some(s => s.x === head.x && s.y === head.y)) {
    gameActive = false;
    if (score > best) { best = score; document.getElementById('best').textContent = best; }
    document.getElementById('finalScore').textContent = 'Score: ' + score;
    document.getElementById('gameOverScreen').classList.remove('hidden');
    clearInterval(timer);
    return;
  }

  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score += 10;
    document.getElementById('score').textContent = score;
    placeFood();
    if (speed > 60) { speed -= 2; clearInterval(timer); timer = setInterval(update, speed); }
  } else {
    snake.pop();
  }
  draw();
}

function draw() {
  ctx.fillStyle = '#0d0d2a';
  ctx.fillRect(0, 0, SIZE, SIZE);
  // Grid
  ctx.strokeStyle = 'rgba(0,229,255,0.03)';
  for (let i = 0; i <= GRID; i++) {
    ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, SIZE); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i * CELL); ctx.lineTo(SIZE, i * CELL); ctx.stroke();
  }
  // Food
  ctx.fillStyle = '#ff4081';
  ctx.shadowColor = '#ff4081';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.arc(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, CELL * 0.35, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  // Snake
  snake.forEach((s, i) => {
    const alpha = 1 - (i / snake.length) * 0.5;
    ctx.fillStyle = i === 0 ? '#00e5ff' : `rgba(0,229,255,${alpha})`;
    ctx.shadowColor = '#00e5ff';
    ctx.shadowBlur = i === 0 ? 8 : 3;
    ctx.fillRect(s.x * CELL + 1, s.y * CELL + 1, CELL - 2, CELL - 2);
  });
  ctx.shadowBlur = 0;
}

document.addEventListener('keydown', e => {
  const map = {
    ArrowUp: { x: 0, y: -1 }, ArrowDown: { x: 0, y: 1 }, ArrowLeft: { x: -1, y: 0 }, ArrowRight: { x: 1, y: 0 },
    w: { x: 0, y: -1 }, s: { x: 0, y: 1 }, a: { x: -1, y: 0 }, d: { x: 1, y: 0 },
    W: { x: 0, y: -1 }, S: { x: 0, y: 1 }, A: { x: -1, y: 0 }, D: { x: 1, y: 0 }
  };
  if (e.key === 'p' || e.key === 'P') { paused = !paused; return; }
  if (map[e.key]) {
    e.preventDefault();
    const nd = map[e.key];
    if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
  }
});
</script>
</body>
</html>
