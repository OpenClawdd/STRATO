<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird - STRATO Games</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a1e; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 10px; overflow: hidden; }
h1 { color: #00e5ff; font-size: clamp(24px, 5vw, 40px); margin: 10px 0; text-shadow: 0 0 20px rgba(0,229,255,0.5); }
.info { display: flex; gap: 20px; margin: 10px 0; }
.score-box { background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.3); border-radius: 8px; padding: 8px 20px; text-align: center; }
.score-box .label { font-size: 12px; color: #00e5ff; text-transform: uppercase; letter-spacing: 2px; }
.score-box .value { font-size: 24px; font-weight: bold; }
canvas { border-radius: 4px; border: 1px solid rgba(0,229,255,0.2); margin: 10px 0; cursor: pointer; }
.controls { color: #667; font-size: 13px; text-align: center; margin-top: 8px; }
.controls span { color: #00e5ff; }
button { background: rgba(0,229,255,0.15); color: #00e5ff; border: 1px solid rgba(0,229,255,0.4); padding: 10px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; margin: 5px; transition: all 0.2s; }
button:hover { background: rgba(0,229,255,0.3); }
.overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,10,30,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
.overlay h2 { font-size: 36px; color: #00e5ff; margin-bottom: 10px; text-shadow: 0 0 20px rgba(0,229,255,0.5); }
.overlay p { font-size: 18px; margin-bottom: 20px; color: #aac; }
.hidden { display: none; }
</style>
<script src="/games/strato-game-shell.js" defer></script>
</head>
<body>
<h1>FLAPPY BIRD</h1>
<div class="info">
  <div class="score-box"><div class="label">Score</div><div class="value" id="score">0</div></div>
  <div class="score-box"><div class="label">Best</div><div class="value" id="best">0</div></div>
</div>
<canvas id="game"></canvas>
<div class="controls"><span>Click</span> or <span>Space</span> to flap</div>
<div class="overlay" id="startScreen">
  <h2>FLAPPY BIRD</h2>
  <p>Flap through the pipes!</p>
  <button data-action="start-game">Play</button>
</div>
<div class="overlay hidden" id="gameOverScreen">
  <h2>Game Over</h2>
  <p id="finalScore">Score: 0</p>
  <button data-action="start-game">Try Again</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 400, H = 600;
canvas.width = W; canvas.height = H;

let bird, pipes, score, best = 0, gameActive = false, frameCount, animId;
const GRAVITY = 0.4, FLAP = -7, PIPE_W = 52, GAP = 140, PIPE_SPEED = 2.5;

function resize() {
  const scale = Math.min((window.innerWidth - 20) / W, (window.innerHeight - 200) / H, 1);
  canvas.style.width = W * scale + 'px';
  canvas.style.height = H * scale + 'px';
}
window.addEventListener('resize', resize);
resize();

function startGame() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  bird = { x: 80, y: H / 2, vy: 0, r: 14 };
  pipes = []; score = 0; frameCount = 0;
  document.getElementById('score').textContent = 0;
  gameActive = true;
  cancelAnimationFrame(animId);
  loop();
}

function flap() {
  if (!gameActive) return;
  bird.vy = FLAP;
}

function addPipe() {
  const minTop = 60, maxTop = H - GAP - 60;
  const top = minTop + Math.random() * (maxTop - minTop);
  pipes.push({ x: W, top: top, scored: false });
}

function update() {
  bird.vy += GRAVITY;
  bird.y += bird.vy;
  frameCount++;
  if (frameCount % 90 === 0) addPipe();

  pipes.forEach(p => {
    p.x -= PIPE_SPEED;
    if (!p.scored && p.x + PIPE_W < bird.x) {
      p.scored = true; score++;
      document.getElementById('score').textContent = score;
    }
  });
  pipes = pipes.filter(p => p.x > -PIPE_W);

  // Collision
  if (bird.y + bird.r > H || bird.y - bird.r < 0) return die();
  for (const p of pipes) {
    if (bird.x + bird.r > p.x && bird.x - bird.r < p.x + PIPE_W) {
      if (bird.y - bird.r < p.top || bird.y + bird.r > p.top + GAP) return die();
    }
  }
}

function die() {
  gameActive = false;
  if (score > best) { best = score; document.getElementById('best').textContent = best; }
  document.getElementById('finalScore').textContent = 'Score: ' + score;
  document.getElementById('gameOverScreen').classList.remove('hidden');
}

function draw() {
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a0a2e');
  grad.addColorStop(1, '#0a1a2e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  for (let i = 0; i < 30; i++) {
    const sx = (i * 137.5) % W, sy = (i * 73.3) % (H * 0.6);
    ctx.fillRect(sx, sy, 1.5, 1.5);
  }

  // Pipes
  pipes.forEach(p => {
    const g = ctx.createLinearGradient(p.x, 0, p.x + PIPE_W, 0);
    g.addColorStop(0, '#005566');
    g.addColorStop(0.5, '#00aacc');
    g.addColorStop(1, '#005566');
    ctx.fillStyle = g;
    // Top pipe
    ctx.fillRect(p.x, 0, PIPE_W, p.top);
    ctx.fillStyle = '#00e5ff';
    ctx.fillRect(p.x - 3, p.top - 20, PIPE_W + 6, 20);
    // Bottom pipe
    ctx.fillStyle = g;
    ctx.fillRect(p.x, p.top + GAP, PIPE_W, H - p.top - GAP);
    ctx.fillStyle = '#00e5ff';
    ctx.fillRect(p.x - 3, p.top + GAP, PIPE_W + 6, 20);
  });

  // Bird
  ctx.save();
  ctx.translate(bird.x, bird.y);
  const angle = Math.min(Math.max(bird.vy * 0.05, -0.5), 1);
  ctx.rotate(angle);
  ctx.shadowColor = '#00e5ff';
  ctx.shadowBlur = 12;
  ctx.fillStyle = '#00e5ff';
  ctx.beginPath();
  ctx.ellipse(0, 0, bird.r + 2, bird.r, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  // Eye
  ctx.fillStyle = '#0a0a1e';
  ctx.beginPath();
  ctx.arc(6, -3, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(7, -3, 2, 0, Math.PI * 2);
  ctx.fill();
  // Wing
  ctx.fillStyle = 'rgba(0,229,255,0.6)';
  ctx.beginPath();
  ctx.ellipse(-4, 2, 10, 5, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Score on screen
  ctx.fillStyle = 'rgba(0,229,255,0.8)';
  ctx.font = 'bold 36px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(score, W / 2, 50);
}

function loop() {
  if (!gameActive) return;
  update();
  if (gameActive) { draw(); animId = requestAnimationFrame(loop); }
  else draw();
}

// Initial draw
ctx.fillStyle = '#0d0d2a';
ctx.fillRect(0, 0, W, H);

document.addEventListener('keydown', e => { if (e.key === ' ' || e.key === 'ArrowUp') { e.preventDefault(); flap(); } });
canvas.addEventListener('click', flap);
canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); });
</script>
</body>
</html>
