<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Invaders - STRATO Games</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a1e; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 10px; overflow: hidden; }
h1 { color: #00e5ff; font-size: clamp(24px, 5vw, 40px); margin: 10px 0; text-shadow: 0 0 20px rgba(0,229,255,0.5); }
.info { display: flex; gap: 20px; margin: 10px 0; flex-wrap: wrap; justify-content: center; }
.score-box { background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.3); border-radius: 8px; padding: 8px 20px; text-align: center; }
.score-box .label { font-size: 12px; color: #00e5ff; text-transform: uppercase; letter-spacing: 2px; }
.score-box .value { font-size: 24px; font-weight: bold; }
canvas { border-radius: 4px; border: 1px solid rgba(0,229,255,0.2); margin: 10px 0; }
.controls { color: #667; font-size: 13px; text-align: center; margin-top: 8px; }
.controls span { color: #00e5ff; }
button { background: rgba(0,229,255,0.15); color: #00e5ff; border: 1px solid rgba(0,229,255,0.4); padding: 10px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; margin: 5px; transition: all 0.2s; }
button:hover { background: rgba(0,229,255,0.3); }
.overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,10,30,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
.overlay h2 { font-size: 36px; color: #00e5ff; margin-bottom: 10px; text-shadow: 0 0 20px rgba(0,229,255,0.5); }
.overlay p { font-size: 18px; margin-bottom: 20px; color: #aac; }
.hidden { display: none; }
</style>
<script src="/games/strato-game-shell.js" defer></script>
</head>
<body>
<h1>SPACE INVADERS</h1>
<div class="info">
  <div class="score-box"><div class="label">Score</div><div class="value" id="score">0</div></div>
  <div class="score-box"><div class="label">Lives</div><div class="value" id="lives">3</div></div>
  <div class="score-box"><div class="label">Level</div><div class="value" id="level">1</div></div>
</div>
<canvas id="game"></canvas>
<div class="controls"><span>←→</span> Move | <span>Space</span> Shoot</div>
<div class="overlay" id="startScreen">
  <h2>SPACE INVADERS</h2>
  <p>Defend Earth from the alien invasion!</p>
  <button data-action="start-game">Play</button>
</div>
<div class="overlay hidden" id="gameOverScreen">
  <h2 id="endTitle">Game Over</h2>
  <p id="endMsg"></p>
  <button data-action="start-game">Try Again</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 500, H = 500;
canvas.width = W; canvas.height = H;

const ROWS = 5, COLS = 8, ALIEN_W = 30, ALIEN_H = 22, ALIEN_PAD = 12;
const ALIEN_TOP = 50;
let player, aliens, bullets, enemyBullets, score, lives, level, gameActive, animId;
let alienDir, alienSpeed, alienMoveTimer, lastShot, shootCooldown;
let keys = {};
let stars = [];

function resize() {
  const scale = Math.min((window.innerWidth - 20) / W, (window.innerHeight - 200) / H, 1);
  canvas.style.width = W * scale + 'px';
  canvas.style.height = H * scale + 'px';
}
window.addEventListener('resize', resize);
resize();

for (let i = 0; i < 80; i++) stars.push({ x: Math.random() * W, y: Math.random() * H, s: Math.random() * 1.5 + 0.5, b: Math.random() });

const ALIEN_COLORS = ['#ff4081','#ff9100','#ffd600','#00e676','#00b0ff'];
const ALIEN_PTS = [50, 40, 30, 20, 10];

function startGame() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  score = 0; lives = 3; level = 1;
  document.getElementById('score').textContent = 0;
  document.getElementById('lives').textContent = 3;
  document.getElementById('level').textContent = 1;
  initLevel();
  gameActive = true;
  cancelAnimationFrame(animId);
  loop();
}

function initLevel() {
  player = { x: W / 2, y: H - 40, w: 36, h: 16 };
  bullets = [];
  enemyBullets = [];
  aliens = [];
  alienDir = 1;
  alienSpeed = 0.5 + level * 0.2;
  alienMoveTimer = 0;
  shootCooldown = 0;

  const totalW = COLS * (ALIEN_W + ALIEN_PAD) - ALIEN_PAD;
  const startX = (W - totalW) / 2;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      aliens.push({ x: startX + c * (ALIEN_W + ALIEN_PAD), y: ALIEN_TOP + r * (ALIEN_H + ALIEN_PAD), w: ALIEN_W, h: ALIEN_H, alive: true, row: r });
}

function update() {
  // Player movement
  if (keys['ArrowLeft'] || keys['a']) player.x -= 5;
  if (keys['ArrowRight'] || keys['d']) player.x += 5;
  player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, player.x));

  // Shooting
  if (shootCooldown > 0) shootCooldown--;
  if ((keys[' '] || keys['ArrowUp']) && shootCooldown <= 0 && bullets.length < 3) {
    bullets.push({ x: player.x, y: player.y - 10, vy: -7 });
    shootCooldown = 15;
  }

  // Move bullets
  bullets.forEach(b => b.y += b.vy);
  bullets = bullets.filter(b => b.y > -10);

  // Enemy shooting
  if (Math.random() < 0.01 + level * 0.005) {
    const alive = aliens.filter(a => a.alive);
    if (alive.length) {
      const shooter = alive[Math.floor(Math.random() * alive.length)];
      enemyBullets.push({ x: shooter.x + shooter.w / 2, y: shooter.y + shooter.h, vy: 3 + level * 0.3 });
    }
  }
  enemyBullets.forEach(b => b.y += b.vy);
  enemyBullets = enemyBullets.filter(b => b.y < H + 10);

  // Move aliens
  alienMoveTimer++;
  const moveEvery = Math.max(1, 6 - Math.floor(level * 0.5));
  if (alienMoveTimer >= moveEvery) {
    alienMoveTimer = 0;
    let hitEdge = false;
    aliens.forEach(a => {
      if (!a.alive) return;
      a.x += alienDir * alienSpeed * 3;
      if (a.x < 5 || a.x + a.w > W - 5) hitEdge = true;
    });
    if (hitEdge) {
      alienDir *= -1;
      aliens.forEach(a => { if (a.alive) a.y += 12; });
    }
  }

  // Bullet-alien collision
  for (let bi = bullets.length - 1; bi >= 0; bi--) {
    for (const a of aliens) {
      if (!a.alive) continue;
      if (bullets[bi].x > a.x && bullets[bi].x < a.x + a.w && bullets[bi].y > a.y && bullets[bi].y < a.y + a.h) {
        a.alive = false;
        score += ALIEN_PTS[a.row];
        document.getElementById('score').textContent = score;
        bullets.splice(bi, 1);
        break;
      }
    }
  }

  // Enemy bullet-player collision
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    if (b.x > player.x - player.w / 2 && b.x < player.x + player.w / 2 && b.y > player.y - player.h / 2 && b.y < player.y + player.h / 2) {
      enemyBullets.splice(i, 1);
      lives--;
      document.getElementById('lives').textContent = lives;
      if (lives <= 0) return endGame(false);
    }
  }

  // Alien reaches bottom
  for (const a of aliens) {
    if (a.alive && a.y + a.h >= player.y - 20) return endGame(false);
  }

  // Level complete
  if (aliens.every(a => !a.alive)) {
    level++;
    document.getElementById('level').textContent = level;
    initLevel();
  }

  // Stars
  stars.forEach(s => { s.b += 0.02; if (s.b > Math.PI * 2) s.b -= Math.PI * 2; });
}

function endGame(won) {
  gameActive = false;
  document.getElementById('endTitle').textContent = won ? 'Victory!' : 'Game Over';
  document.getElementById('endMsg').textContent = 'Score: ' + score + ' | Level: ' + level;
  document.getElementById('gameOverScreen').classList.remove('hidden');
}

function drawAlien(a) {
  const cx = a.x + a.w / 2, cy = a.y + a.h / 2;
  const color = ALIEN_COLORS[a.row];
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = 6;

  // Body
  ctx.fillRect(a.x + 4, a.y + 4, a.w - 8, a.h - 8);
  // Wings
  ctx.fillRect(a.x, a.y + 8, 6, a.h - 14);
  ctx.fillRect(a.x + a.w - 6, a.y + 8, 6, a.h - 14);
  // Eyes
  ctx.fillStyle = '#0a0a1e';
  ctx.fillRect(a.x + 8, a.y + 8, 4, 4);
  ctx.fillRect(a.x + a.w - 12, a.y + 8, 4, 4);
  // Antenna
  ctx.fillStyle = color;
  ctx.fillRect(cx - 4, a.y, 2, 6);
  ctx.fillRect(cx + 2, a.y, 2, 6);
  ctx.shadowBlur = 0;
}

function draw() {
  ctx.fillStyle = '#0a0a2e';
  ctx.fillRect(0, 0, W, H);

  // Stars
  stars.forEach(s => {
    ctx.fillStyle = `rgba(255,255,255,${0.2 + Math.sin(s.b) * 0.15})`;
    ctx.fillRect(s.x, s.y, s.s, s.s);
  });

  // Aliens
  aliens.forEach(a => { if (a.alive) drawAlien(a); });

  // Player
  ctx.fillStyle = '#00e5ff';
  ctx.shadowColor = '#00e5ff';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.moveTo(player.x, player.y - player.h / 2);
  ctx.lineTo(player.x - player.w / 2, player.y + player.h / 2);
  ctx.lineTo(player.x + player.w / 2, player.y + player.h / 2);
  ctx.closePath();
  ctx.fill();
  // Cannon
  ctx.fillRect(player.x - 2, player.y - player.h, 4, player.h / 2);
  ctx.shadowBlur = 0;

  // Player bullets
  ctx.fillStyle = '#00e5ff';
  ctx.shadowColor = '#00e5ff';
  ctx.shadowBlur = 6;
  bullets.forEach(b => ctx.fillRect(b.x - 2, b.y - 6, 4, 12));
  ctx.shadowBlur = 0;

  // Enemy bullets
  ctx.fillStyle = '#ff4081';
  ctx.shadowColor = '#ff4081';
  ctx.shadowBlur = 6;
  enemyBullets.forEach(b => ctx.fillRect(b.x - 2, b.y - 4, 4, 8));
  ctx.shadowBlur = 0;

  // Shields/ground line
  ctx.strokeStyle = 'rgba(0,229,255,0.15)';
  ctx.beginPath();
  ctx.moveTo(0, H - 15);
  ctx.lineTo(W, H - 15);
  ctx.stroke();
}

function loop() {
  if (!gameActive) return;
  update();
  if (gameActive) { draw(); animId = requestAnimationFrame(loop); }
  else draw();
}

ctx.fillStyle = '#0a0a2e';
ctx.fillRect(0, 0, W, H);

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if ([' ', 'ArrowLeft', 'ArrowRight', 'ArrowUp'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });
</script>
</html>
