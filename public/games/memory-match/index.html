<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Memory Match — STRATO</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a1e;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:16px}h1{font-size:1.4rem;margin-bottom:4px;color:#00e5ff}nav{margin-bottom:10px}nav button{background:rgba(0,229,255,0.12);border:1px solid rgba(0,229,255,0.3);color:#00e5ff;padding:6px 16px;border-radius:8px;cursor:pointer;font-size:0.8rem}.stats{display:flex;gap:16px;margin-bottom:12px;font-size:0.85rem;color:rgba(255,255,255,0.6)}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.card{width:70px;height:70px;border-radius:10px;cursor:pointer;perspective:400px;transition:transform 0.15s}.card:hover{transform:scale(1.05)}.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.4s}.card.flipped .card-inner{transform:rotateY(180deg)}.card-front,.card-back{position:absolute;inset:0;border-radius:10px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden}.card-front{background:rgba(0,229,255,0.08);border:1px solid rgba(0,229,255,0.2);font-size:1.5rem}.card-back{background:rgba(0,229,255,0.12);border:1px solid rgba(0,229,255,0.3);transform:rotateY(180deg);font-size:2rem}.card.matched .card-back{background:rgba(34,197,94,0.15);border-color:rgba(34,197,94,0.4)}.btn{background:rgba(0,229,255,0.12);border:1px solid rgba(0,229,255,0.3);color:#00e5ff;padding:8px 24px;border-radius:10px;cursor:pointer;font-size:0.85rem;margin-top:10px}</style></head><body>
<h1>Memory Match</h1>
<nav><button onclick="history.back()">&larr; Back</button></nav>
<div class="stats"><span>Moves: <b id="moves">0</b></span><span>Pairs: <b id="pairs">0</b>/8</span></div>
<div id="grid" class="grid"></div>
<button class="btn" onclick="init()">New Game</button>
<script>
const EMOJIS=['🎮','🚀','⚡','🔥','💎','🌟','🎵','🎲'];let cards=[],flipped=[],matched=0,moves=0,lock=false;
function init(){const arr=[...EMOJIS,...EMOJIS];for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}cards=arr;flipped=[];matched=0;moves=0;lock=false;document.getElementById('moves').textContent='0';document.getElementById('pairs').textContent='0';render()}
function render(){const grid=document.getElementById('grid');grid.innerHTML='';cards.forEach((emoji,i)=>{const card=document.createElement('div');card.className='card';card.innerHTML=`<div class="card-inner"><div class="card-front">?</div><div class="card-back">${emoji}</div></div>`;card.onclick=()=>flip(i);grid.appendChild(card)})}
function flip(i){if(lock||flipped.includes(i)||document.querySelectorAll('.card')[i].classList.contains('flipped'))return;const el=document.querySelectorAll('.card')[i];el.classList.add('flipped');flipped.push(i);if(flipped.length===2){moves++;document.getElementById('moves').textContent=moves;lock=true;setTimeout(check,600)}}
function check(){const[ a,b]=flipped;if(cards[a]===cards[b]){document.querySelectorAll('.card')[a].classList.add('matched');document.querySelectorAll('.card')[b].classList.add('matched');matched++;document.getElementById('pairs').textContent=matched;if(matched===8)alert('You won in '+moves+' moves!')}else{document.querySelectorAll('.card')[a].classList.remove('flipped');document.querySelectorAll('.card')[b].classList.remove('flipped')}flipped=[];lock=false}
init();
</script></body></html>
