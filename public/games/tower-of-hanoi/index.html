<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Tower of Hanoi — STRATO</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a1e;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:16px}h1{font-size:1.4rem;margin-bottom:4px;color:#00e5ff}nav{margin-bottom:10px}nav button{background:rgba(0,229,255,0.12);border:1px solid rgba(0,229,255,0.3);color:#00e229,255,0.3);color:#00e5ff;padding:6px 16px;border-radius:8px;cursor:pointer;font-size:0.8rem}.info{font-size:0.85rem;color:rgba(255,255,255,0.6);margin-bottom:8px}.stats{font-size:0.85rem;color:rgba(255,255,255,0.6);margin-bottom:12px}.towers{display:flex;gap:20px;justify-content:center;margin-bottom:16px}.tower{display:flex;flex-direction:column-reverse;align-items:center;width:160px;min-height:180px;background:rgba(0,229,255,0.04);border:1px solid rgba(0,229,255,0.15);border-radius:12px;padding:8px 4px;cursor:pointer;transition:all 0.15s;position:relative}.tower:hover{background:rgba(0,229,255,0.08);border-color:rgba(0,229,255,0.25)}.tower.selected{border-color:#00e5ff;box-shadow:0 0 16px rgba(0,229,255,0.2)}.tower::after{content:'';position:absolute;bottom:8px;width:80%;height:4px;background:rgba(0,229,255,0.3);border-radius:2px}.peg-label{font-size:0.7rem;color:rgba(255,255,255,0.3);margin-top:4px}.disk{height:20px;border-radius:10px;margin:1px 0;transition:all 0.2s;cursor:pointer}.disk:hover{filter:brightness(1.2)}.btn{background:rgba(0,229,255,0.12);border:1px solid rgba(0,229,255,0.3);color:#00e5ff;padding:8px 24px;border-radius:10px;cursor:pointer;font-size:0.85rem}</style></head><body>
<h1>Tower of Hanoi</h1>
<nav><button onclick="history.back()">&larr; Back</button></nav>
<div class="info">Move all disks from Peg A to Peg C. Click a tower to pick up/place.</div>
<div class="stats">Moves: <b id="moves">0</b> | Minimum: <b id="min">31</b></div>
<div class="towers">
  <div class="tower" data-peg="0" onclick="clickTower(0)"><span class="peg-label">A</span></div>
  <div class="tower" data-peg="1" onclick="clickTower(1)"><span class="peg-label">B</span></div>
  <div class="tower" data-peg="2" onclick="clickTower(2)"><span class="peg-label">C</span></div>
</div>
<button class="btn" onclick="init()">Reset</button>
<script>
const NUM=5,COLORS=['#ef4444','#f97316','#eab308','#22c55e','#3b82f6'];let pegs=[[],[],[]],selected=-1,moves=0;
function init(){pegs=[[],[],[]];for(let i=NUM;i>=1;i--)pegs[0].push(i);selected=-1;moves=0;document.getElementById('moves').textContent='0';document.getElementById('min').textContent=Math.pow(2,NUM)-1;render()}
function render(){const towers=document.querySelectorAll('.tower');towers.forEach((t,i)=>{t.querySelectorAll('.disk').forEach(d=>d.remove());const label=t.querySelector('.peg-label');pegs[i].forEach(disk=>{const el=document.createElement('div');el.className='disk';el.style.width=(30+disk*22)+'px';el.style.background=COLORS[disk-1];t.insertBefore(el,label)});t.classList.toggle('selected',i===selected)})}
function clickTower(i){if(selected===-1){if(pegs[i].length===0)return;selected=i}else if(selected===i){selected=-1}else{const from=pegs[selected],to=pegs[i];if(to.length>0&&from[from.length-1]>to[to.length-1]){selected=-1;render();return}to.push(from.pop());moves++;selected=-1;document.getElementById('moves').textContent=moves;if(pegs[2].length===NUM)alert('You won in '+moves+' moves!')}render()}
init();
</script></body></html>
